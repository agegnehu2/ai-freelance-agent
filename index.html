<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Freelance Agent Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background-color: #161b22; border: 1px solid #30363d; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .btn { background-color: #238636; color: #ffffff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .status { color: #58a6ff; font-weight: bold; }
        .price { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💼 AI Freelance Agent</h1>
        <div class="card">
            <h3>Agent Status: <span class="status">Scanning Live...</span></h3>
            <p>Developer: <strong>Agegnehu Shibiru</strong></p>
        </div>
        <h2>Active Bounties & Jobs</h2>
        <div id="job-list"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
